name = "mmc-reminders"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# 9:00 AM America/New_York every day.
# Cloudflare cron runs in UTC and isn't DST-aware. 13:00 UTC is 9 AM EDT (summer);
# 14:00 UTC is 9 AM EST (winter). The Worker checks the actual local hour at fire
# time and drops whichever schedule didn't land on local 9.
# The handler then routes:
#   - Wed/Thu/Fri → weekend-banner check (existing behavior)
#   - Every day → holiday check (sends 2 days before each holiday)
[triggers]
crons = [
  "0 13 * * *",
  "0 14 * * *"
]

# Allow manual testing from the dashboard's "Run" button or HTTP fetch.
# Variables (non-secret) — fill in values that aren't sensitive here.
[vars]
SITE_URL = "https://mmccare.com/frontdesk-briefing-room/"
PUBLIC_SITE_URL = "https://mmccare.com/"
FROM_EMAIL = "MMC Briefing Room <hello@mmccare.com>"
ADMIN_EMAILS = "efikess@gmail.com,bendoryair@gmail.com"
TZ_NAME = "America/New_York"

# Secrets (set via `wrangler secret put`):
# - RESEND_API_KEY
# - FIREBASE_PROJECT_ID                  (e.g. mmcblog-6573f)
# - FIREBASE_SERVICE_ACCOUNT_EMAIL       (from the service-account JSON, "client_email")
# - FIREBASE_SERVICE_ACCOUNT_PRIVATE_KEY (from the service-account JSON, "private_key" — keep the literal \n line breaks)
